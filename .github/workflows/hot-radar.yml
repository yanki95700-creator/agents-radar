name: Hot Radar

# 每天在云端跑 AI 热点流水线，把最新数据提交回仓库，由 GitHub Pages 对外提供
# https://<owner>.github.io/agents-radar/hot.html

on:
  schedule:
    # 00:30 UTC = 08:30 CST
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hot radar (with DeepSeek)
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: pnpm exec tsx radar-hot.ts --llm

      - name: Run CN daily digest (tolerant)
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: pnpm exec tsx daily-radar-cn.ts --llm || echo "cn digest failed, continuing"

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hot-data digests-demo
          git diff --cached --quiet || git commit --no-verify -m "chore: daily hot radar data [skip ci]"
          git push
